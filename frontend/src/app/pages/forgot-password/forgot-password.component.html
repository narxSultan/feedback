<div class="flex min-h-screen items-center justify-center px-4">
  <div class="w-full max-w-md rounded-3xl border border-primary-100 bg-white p-8 shadow-soft">
    <h1 class="text-3xl font-semibold text-green-900">Forgot Password</h1>
    <p class="mt-2 text-green-700">Enter your registered email to receive reset link.</p>

    <form class="mt-6 space-y-3" (ngSubmit)="submit()">
      <input type="email" [(ngModel)]="email" name="email" required placeholder="Email" class="w-full rounded-xl border border-green-200 px-4 py-3 outline-none focus:border-primary-400" />
      <button type="submit" class="w-full rounded-xl bg-primary-300 px-5 py-3 font-semibold text-green-900 hover:bg-primary-400"><span class="inline-flex items-center gap-2"><svg aria-hidden="true" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16v12H4z"/><path stroke-linecap="round" stroke-linejoin="round" d="m4 7 8 6 8-6"/></svg>Send Reset Link</span></button>
      <p *ngIf="message" class="text-sm text-green-700 break-all">{{ message }}</p>
    </form>

    <a routerLink="/user-login" class="mt-4 inline-block text-sm text-green-700 hover:underline">Back to login</a>
  </div>
</div>
