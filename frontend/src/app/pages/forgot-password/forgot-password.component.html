<div class="flex min-h-screen items-center justify-center px-4">
  <div class="w-full max-w-md rounded-3xl border border-primary-100 bg-white p-8 shadow-soft">
    <h1 class="text-3xl font-semibold text-green-900">Forgot Password</h1>
    <p class="mt-2 text-green-700">Enter your registered email to reset your password.</p>

    <form *ngIf="step === 'email'" class="mt-6 space-y-3" (ngSubmit)="submit()">
      <input type="email" [(ngModel)]="email" name="email" required placeholder="Email" class="w-full rounded-xl border border-green-200 px-4 py-3 outline-none focus:border-primary-400" />
      <button type="submit" class="w-full rounded-xl bg-primary-300 px-5 py-3 font-semibold text-green-900 hover:bg-primary-400"><span class="inline-flex items-center gap-2"><svg aria-hidden="true" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16v12H4z"/><path stroke-linecap="round" stroke-linejoin="round" d="m4 7 8 6 8-6"/></svg>Continue</span></button>
    </form>

    <form *ngIf="step === 'reset'" class="mt-6 space-y-3" (ngSubmit)="saveNewPassword()">
      <div class="relative">
        <input [type]="showNewPassword ? 'text' : 'password'" [(ngModel)]="newPassword" name="newPassword" required placeholder="New password" class="w-full rounded-xl border border-green-200 px-4 py-3 pr-12 outline-none focus:border-primary-400" />
        <button
          type="button"
          (click)="togglePasswordVisibility('new')"
          class="absolute inset-y-0 right-2 my-auto h-fit rounded-lg p-2 text-green-700 hover:bg-green-50"
          [attr.aria-label]="showNewPassword ? 'Hide password' : 'Show password'"
        >
          <svg aria-hidden="true" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"/>
            <circle cx="12" cy="12" r="3"/>
            <path *ngIf="showNewPassword" stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18"/>
          </svg>
        </button>
      </div>

      <div class="relative">
        <input [type]="showConfirmPassword ? 'text' : 'password'" [(ngModel)]="confirmPassword" name="confirmPassword" required placeholder="Confirm password" class="w-full rounded-xl border border-green-200 px-4 py-3 pr-12 outline-none focus:border-primary-400" />
        <button
          type="button"
          (click)="togglePasswordVisibility('confirm')"
          class="absolute inset-y-0 right-2 my-auto h-fit rounded-lg p-2 text-green-700 hover:bg-green-50"
          [attr.aria-label]="showConfirmPassword ? 'Hide password' : 'Show password'"
        >
          <svg aria-hidden="true" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"/>
            <circle cx="12" cy="12" r="3"/>
            <path *ngIf="showConfirmPassword" stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18"/>
          </svg>
        </button>
      </div>

      <button type="submit" class="w-full rounded-xl bg-primary-300 px-5 py-3 font-semibold text-green-900 hover:bg-primary-400"><span class="inline-flex items-center gap-2"><svg aria-hidden="true" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="5" y="11" width="14" height="10" rx="2"/><path stroke-linecap="round" d="M8 11V8a4 4 0 1 1 8 0v3"/></svg>Save New Password</span></button>
    </form>

    <p *ngIf="message" class="mt-3 text-sm break-all" [class.text-red-600]="isError" [class.text-green-700]="!isError">{{ message }}</p>

    <div *ngIf="step === 'done'" class="mt-4">
      <a routerLink="/user-login" class="inline-block text-sm text-green-700 hover:underline">Go to login</a>
    </div>

    <a *ngIf="step !== 'done'" routerLink="/user-login" class="mt-4 inline-block text-sm text-green-700 hover:underline">Back to login</a>
  </div>
</div>
