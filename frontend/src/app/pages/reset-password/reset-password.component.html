<div class="flex min-h-screen items-center justify-center px-4">
  <div class="w-full max-w-md rounded-3xl border border-primary-100 bg-white p-8 shadow-soft">
    <h1 class="text-3xl font-semibold text-green-900">Reset Password</h1>
    <p class="mt-2 text-green-700">Set your new password.</p>

    <form class="mt-6 space-y-3" (ngSubmit)="submit()">
      <input type="password" [(ngModel)]="newPassword" name="newPassword" required placeholder="New password" class="w-full rounded-xl border border-green-200 px-4 py-3 outline-none focus:border-primary-400" />
      <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required placeholder="Confirm password" class="w-full rounded-xl border border-green-200 px-4 py-3 outline-none focus:border-primary-400" />
      <button type="submit" class="w-full rounded-xl bg-primary-300 px-5 py-3 font-semibold text-green-900 hover:bg-primary-400"><span class="inline-flex items-center gap-2"><svg aria-hidden="true" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="5" y="11" width="14" height="10" rx="2"/><path stroke-linecap="round" d="M8 11V8a4 4 0 1 1 8 0v3"/></svg>Reset Password</span></button>
      <p *ngIf="message" class="text-sm text-green-700">{{ message }}</p>
    </form>

    <a routerLink="/user-login" class="mt-4 inline-block text-sm text-green-700 hover:underline">Back to login</a>
  </div>
</div>
