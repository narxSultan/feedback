<div class="flex min-h-screen items-center justify-center px-4">
  <div class="w-full max-w-md rounded-3xl border border-primary-100 bg-white p-8 shadow-soft">
    <h1 class="text-3xl font-semibold text-green-900">Admin Login</h1>
    <p class="mt-2 text-green-700">Login to manage events and view feedback.</p>

    <form class="mt-6 space-y-4" (ngSubmit)="login()">
      <input
        type="email"
        [(ngModel)]="email"
        name="email"
        placeholder="Email"
        required
        class="w-full rounded-xl border border-green-200 px-4 py-3 outline-none focus:border-primary-400"
      />
      <div class="relative">
        <input
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          name="password"
          placeholder="Password"
          required
          class="w-full rounded-xl border border-green-200 px-4 py-3 pr-12 outline-none focus:border-primary-400"
        />
        <button
          type="button"
          (click)="togglePasswordVisibility()"
          class="absolute inset-y-0 right-2 my-auto h-fit rounded-lg p-2 text-green-700 hover:bg-green-50"
          [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
        >
          <svg aria-hidden="true" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"/>
            <circle cx="12" cy="12" r="3"/>
            <path *ngIf="showPassword" stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18"/>
          </svg>
        </button>
      </div>

      <button
        type="submit"
        class="w-full rounded-xl bg-primary-300 px-5 py-3 font-semibold text-green-900 transition hover:bg-primary-400"
      >
        <span class="inline-flex items-center gap-2">
          <svg aria-hidden="true" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17l5-5-5-5"/><path stroke-linecap="round" d="M20 12H9"/><path stroke-linecap="round" d="M9 4H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h4"/></svg>
          Login
        </span>
      </button>

      <p *ngIf="errorMessage" class="text-sm text-red-600">{{ errorMessage }}</p>
    </form>

    <a routerLink="/" class="mt-5 inline-block text-sm font-medium text-green-700 hover:underline">Back to Landing</a>
  </div>
</div>
