<div class="min-h-screen px-4 py-10 sm:px-8">
  <div class="mx-auto max-w-5xl rounded-3xl border border-primary-100 bg-white p-6 shadow-soft">
    <div class="mb-5 flex items-center justify-between">
      <h1 class="text-2xl font-semibold text-green-900">Event Feedback</h1>
      <a routerLink="/events" class="text-sm text-green-700 hover:underline">Back to Events</a>
    </div>

    <p *ngIf="message" class="mb-4 text-sm text-red-600">{{ message }}</p>

    <div class="space-y-3">
      <article *ngFor="let item of feedbackList" class="rounded-2xl border border-green-100 p-4">
        <div class="flex items-center justify-between gap-3">
          <p class="font-semibold text-green-900">Rating: {{ item.rating }}/5</p>
          <p class="rounded-full bg-primary-100 px-3 py-1 text-xs font-semibold text-green-700">{{ item.satisfaction }}</p>
        </div>
        <p class="mt-3 text-green-800">{{ item.comment }}</p>
        <p class="mt-2 text-sm text-green-700">
          {{ item.name || 'Anonymous' }}
          <span *ngIf="item.email">• {{ item.email }}</span>
        </p>
        <div *ngIf="item.custom_answers | keyvalue as answers" class="mt-3 space-y-1" >
          <div *ngFor="let answer of answers" class="rounded-lg bg-green-50 px-3 py-2 text-sm text-green-800">
            <span class="font-semibold">{{ answer.key }}:</span> {{ formatAnswer(answer.value) }}
          </div>
        </div>
      </article>

      <p *ngIf="!feedbackList.length" class="text-sm text-green-700">No feedback submitted for this event yet.</p>
    </div>
  </div>
</div>
